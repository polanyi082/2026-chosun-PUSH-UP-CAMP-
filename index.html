        }

        #slide-container {
            width: 100vw;

            background-color: #0a0a0a;
            position: relative;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        #slide-container::after {
            content: '';
            position: absolute;
            bottom: 5%;
            left: 10%;
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.4), transparent);
        }

        h1, h2, h3, p { margin: 0; color: #ffffff; }

            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .full-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.85);
            z-index: 2;
        }
        
        .content-layer {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 0 5%;
        }

        .title-main { font-size: 8vw; font-weight: 900; letter-spacing: -2px; margin-bottom: 2vh; text-shadow: 0 0 30px rgba(0, 255, 157, 0.4); }
        .title-sub { color: #cccccc; font-size: 2vw; font-weight: 400; letter-spacing: 2px; line-height: 1.5; }

        .section-title { font-size: 7vw; font-weight: 900; margin-bottom: 3vh; }
        .section-desc { color: #dddddd; font-size: 2.2vw; font-weight: 400; line-height: 1.6; word-break: keep-all;}
        .divider { width: 100px; height: 6px; background-color: #00FF9D; margin: 4vh auto; border-radius: 3px; }

        .game-label {
            position: absolute;
            top: 6%;
            left: 6%;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .team-badge {
            background-color: #00FF9D;
            color: #0a0a0a;
            font-size: 2.5vw;
            font-weight: 900;
            padding: 8px 24px;
            border-radius: 10px;
        }
        .label-divider { color: #555555; font-size: 2.5vw; font-weight: 400; }
        .category-text { color: #ffffff; font-size: 2.5vw; font-weight: 700; }

        .keyword-text {
            color: #ffffff;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1.2;
            text-align: center;
            word-break: keep-all;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 15px;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .controls:hover { opacity: 1; }
        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn:hover { background: #00FF9D; color: #000; border-color: #00FF9D; }
        .counter { color: #888; font-size: 18px; margin-right: 10px; font-weight: 700; }
        
        .nav-hint {
            position: absolute;
            bottom: 5%;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 1.2vw;
            z-index: 5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }
    </style>
</head>

                    html: `
                        <div class="content-layer">
                            <h2 style="color: #00FF9D; font-size: 8vw; font-weight: 900; margin-bottom: 2vh;">TIME OVER</h2>
                            <p style="font-size: 3vw; font-weight: 700;">${currentTeam} 수고하셨습니다!</p>
                        </div>
                    `
                });
            }
            slides.push({
                type: 'ready',
                html: `
                    <div class="content-layer">
                        <h2 style="font-size: 9vw; font-weight: 900;">${team} <span class="text-accent">준비!</span></h2>
                        <p style="font-size: 3vw; margin-top: 2vh;">Are you ready?</p>
                    </div>
                `
            });
            currentTeam = team;
        }

        let fontSize = "10vw";
        if (keyword.length > 10) fontSize = "7vw";
        else if (keyword.length > 6) fontSize = "8.5vw";

        slides.push({
            type: 'game',
            html: `
                <div class="game-label">
                    <span class="team-badge">${team}</span>
                    <span class="label-divider">/</span>
                    <span class="category-text">${category}</span>
                </div>
                <div class="content-layer">
                    <h1 class="keyword-text" style="font-size: ${fontSize};">${keyword.replace('(', '<br><span style="font-size:0.5em; color:#aaa;">(').replace(')', ')</span>')}</h1>
                </div>
            `
        });
    });

    if (currentTeam !== "") {
        slides.push({
            type: 'outro',
            html: `
                <div class="content-layer">
                    <h2 style="color: #00FF9D; font-size: 8vw; font-weight: 900; margin-bottom: 2vh;">TIME OVER</h2>
                    <p style="font-size: 3vw; font-weight: 700;">${currentTeam} 수고하셨습니다!</p>
                </div>
            `
        });
    }

    slides.push({
        type: 'end',
        html: `
            <div class="full-bg" style="background-image: url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1974&auto=format&fit=crop');"></div>
            <div class="content-layer">
                <h1 class="title-main text-accent">수고하셨습니다!</h1>
                <p class="title-sub" style="color:#fff;">조선대학교 PUSH 業 진로취업캠프</p>
            </div>
        `
    });

    let currentIndex = 0;
    const container = document.getElementById('slide-container');
    const counterDisplay = document.getElementById('slide-counter');

    function renderSlide(index) {
        container.style.opacity = 0;
        
        setTimeout(() => {
            container.innerHTML = slides[index].html;
            counterDisplay.innerText = `${index + 1} / ${slides.length}`;
            container.style.opacity = 1;
        }, 150); 
    }

    function nextSlide() {
        if (currentIndex < slides.length - 1) {
            currentIndex++;
            renderSlide(currentIndex);
        }
    }

    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            renderSlide(currentIndex);
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            nextSlide();  
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevSlide();
        }
    });

    window.onload = () => {
        renderSlide(currentIndex);
    };

</script>
</body>
</html>
